name: "Docs Version Check"
on:
  push:
    branches: [main, branch-*]
    paths:
      - 'docs/**'
      - 'version.sbt'
      - 'project/spark-versions.json'
      - 'project/tests/test_docs_versions.py'
      - '.github/workflows/docs-version-check.yml'
  pull_request:
    branches: [main, branch-*]
    paths:
      - 'docs/**'
      - 'version.sbt'
      - 'project/spark-versions.json'
      - 'project/tests/test_docs_versions.py'
      - '.github/workflows/docs-version-check.yml'

permissions:
  contents: read

jobs:
  check:
    name: "Docs Version Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check docs versions match the build configuration
        run: python3 project/tests/test_docs_versions.py
